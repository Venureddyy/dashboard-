<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
:root {
  --bg:#f5f5f5; --panel:#fff; --panel2:#efefef; --border:#e0e0e0;
  --text:#1a1a1a; --muted:#888; --blue:#3e88e8; --blue-d:#1a5fc8;
  --red:#e03c3c; --green:#28a745;
}
html,body { width:100vw; height:100vh; overflow:hidden; background:var(--bg); font-family:'Roboto',sans-serif; color:var(--text); }
.root { width:100%; height:100%; display:grid; grid-template-columns:340px 1fr; }

/* LEFT */
.left { background:var(--panel); display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; }

/* top bar */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:7px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.tl,.tr { display:flex; align-items:center; gap:8px; }
#clock { font-size:15px; font-weight:500; }
.temp { font-size:13px; color:var(--muted); }

.fs-btn { background:var(--panel2); border:1px solid var(--border); border-radius:6px; cursor:pointer; padding:5px; display:flex; align-items:center; color:var(--muted); transition:all .15s; }
.fs-btn:hover,.fs-btn:active { background:var(--blue); color:#fff; border-color:var(--blue); }

.batt { display:flex; align-items:center; gap:4px; }
.batt-b { width:26px; height:13px; border:2px solid #bbb; border-radius:3px; padding:1.5px; position:relative; }
.batt-b::after { content:''; position:absolute; right:-4px; top:50%; transform:translateY(-50%); width:3px; height:6px; background:#bbb; border-radius:0 2px 2px 0; }
.batt-f { height:100%; background:var(--green); border-radius:1px; width:70%; }
.batt-t { font-size:11px; color:var(--muted); font-weight:500; }

/* gear */
.gear { display:flex; align-items:center; justify-content:space-between; padding:7px 18px 3px; flex-shrink:0; }
.gears { display:flex; gap:14px; }
.gears span { font-size:15px; font-weight:500; color:#ccc; }
.gears span.on { color:var(--text); font-weight:700; font-size:18px; }
.rng { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:3px; }
.rng strong { color:var(--text); }

/* speed */
.speed-sec { display:flex; flex-direction:column; align-items:center; padding:4px 0 0; flex-shrink:0; }
#spd { font-size:108px; font-weight:300; line-height:1; letter-spacing:-4px; transition:color .3s; font-variant-numeric:tabular-nums; }
#spd.over { color:var(--red); }
.mph { font-size:12px; font-weight:600; color:var(--muted); letter-spacing:3px; }

/* limit row */
.lim-row { display:flex; align-items:center; justify-content:space-between; padding:3px 22px; flex-shrink:0; }
.sl { width:48px; height:48px; border-radius:50%; border:3.5px solid var(--red); background:#fff; box-shadow:0 1px 6px rgba(0,0,0,.12); display:flex; flex-direction:column; align-items:center; justify-content:center; }
.sl .sl-l { font-size:6px; font-weight:700; letter-spacing:.3px; text-align:center; line-height:1.3; }
.sl .sl-n { font-size:18px; font-weight:700; line-height:1; }
.setwrap { display:flex; flex-direction:column; align-items:center; }
.setlbl { font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.setctrl { display:flex; align-items:center; gap:7px; }
.setctrl button { width:23px; height:23px; border-radius:50%; border:1.5px solid var(--border); background:var(--panel2); font-size:16px; cursor:pointer; color:var(--text); display:flex; align-items:center; justify-content:center; transition:all .1s; }
.setctrl button:active { background:var(--blue); color:#fff; border-color:var(--blue); }
#setval { font-size:18px; font-weight:700; min-width:26px; text-align:center; }

/* odo */
.odo { text-align:center; padding:1px 0 3px; flex-shrink:0; }
.odo-l { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
#odov { font-family:'Roboto Mono',monospace; font-size:14px; font-weight:500; }

/* music */
.music { margin:5px 10px 0; background:var(--panel2); border-radius:13px; padding:10px 12px 8px; flex:1; min-height:0; display:flex; flex-direction:column; gap:6px; }
.mhdr { display:flex; align-items:center; justify-content:space-between; }
.msrc { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:1px; }
.gd { width:6px; height:6px; border-radius:50%; background:#1db954; }
#mstatus { font-size:10px; color:var(--muted); }

.arow { display:flex; align-items:center; gap:10px; }
.art { width:58px; height:58px; border-radius:10px; flex-shrink:0; background:linear-gradient(135deg,#667eea,#764ba2); box-shadow:0 4px 12px rgba(0,0,0,.15); display:flex; align-items:center; justify-content:center; font-size:24px; transition:background .4s; }
.art.glow { animation:aglow 2s ease-in-out infinite; }
@keyframes aglow { 0%,100%{box-shadow:0 4px 12px rgba(0,0,0,.15);} 50%{box-shadow:0 6px 20px rgba(62,136,232,.35);} }
.smeta { flex:1; min-width:0; }
.stitle { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sartist { font-size:11px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.prow { display:flex; align-items:center; gap:7px; }
.pbar { flex:1; height:4px; background:#ddd; border-radius:2px; cursor:pointer; }
.pfill { height:100%; background:var(--blue); border-radius:2px; width:0%; pointer-events:none; }
.tlbl { font-size:10px; color:var(--muted); font-family:'Roboto Mono',monospace; }

.mctrl { display:flex; align-items:center; justify-content:center; gap:16px; }
.mcb { background:none; border:none; cursor:pointer; color:var(--muted); display:flex; align-items:center; padding:4px; transition:color .15s, transform .1s; }
.mcb:hover { color:var(--text); }
.mcb:active { transform:scale(.88); }
.pbtn { width:40px; height:40px; border-radius:50%; background:var(--blue); color:#fff !important; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 10px rgba(62,136,232,.4); }
.pbtn:active { background:var(--blue-d) !important; transform:scale(.93) !important; }

.vrow { display:flex; align-items:center; gap:7px; }
.vico { color:var(--muted); flex-shrink:0; }
.vtrack { flex:1; height:4px; background:#ddd; border-radius:2px; cursor:pointer; }
.vfill { height:100%; background:var(--muted); border-radius:2px; width:70%; pointer-events:none; }

/* bottom bar */
.bbar { border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; padding:7px 4px; flex-shrink:0; }
.bb { display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; cursor:pointer; color:var(--muted); font-size:9px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; padding:3px 8px; border-radius:7px; transition:all .2s; }
.bb svg { width:17px; height:17px; }
.bb:hover,.bb.on { color:var(--blue); background:rgba(62,136,232,.08); }

/* RIGHT */
.right { position:relative; overflow:hidden; background:#e8ede0; }
#map { width:100%; height:100%; border:none; display:block; padding-top:46px; }

.mtopbar { position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:rgba(255,255,255,.93); backdrop-filter:blur(8px); border-bottom:1px solid rgba(0,0,0,.08); z-index:20; }
.msearch { display:flex; align-items:center; gap:6px; background:var(--panel2); border-radius:18px; padding:5px 12px; flex:1; max-width:260px; font-size:12px; color:var(--muted); }
.mbtn { width:32px; height:32px; border-radius:50%; background:#fff; border:none; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.12); display:flex; align-items:center; justify-content:center; color:var(--blue); transition:background .2s; }
.mbtn:hover { background:var(--blue); color:#fff; }
.mbtn:active { transform:scale(.93); }

.gpspill { position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,.62); color:#fff; border-radius:20px; padding:5px 11px; font-size:11px; display:flex; align-items:center; gap:5px; z-index:20; backdrop-filter:blur(4px); }
.gdot { width:7px; height:7px; border-radius:50%; background:#ff5555; flex-shrink:0; }
.gdot.ok { background:#39e07a; animation:blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }
</style>
</head>
<body>
<div class="root">

  <!-- LEFT -->
  <div class="left">
    <div class="topbar">
      <div class="tl">
        <span id="clock">--:-- --</span>
        <span class="temp">72°F</span>
      </div>
      <div class="tr">
        <button class="fs-btn" onclick="toggleFS()" title="Fullscreen">
          <svg id="fsico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
        </button>
        <div class="batt">
          <div class="batt-b"><div class="batt-f"></div></div>
          <span class="batt-t">247 mi</span>
        </div>
      </div>
    </div>

    <div class="gear">
      <div class="gears"><span>P</span><span>R</span><span>N</span><span class="on">D</span></div>
      <div class="rng">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <strong>247 mi</strong>
      </div>
    </div>

    <div class="speed-sec">
      <div id="spd">0</div>
      <div class="mph">MPH</div>
    </div>

    <div class="lim-row">
      <div style="width:48px;height:48px;border-radius:50%;border:2.5px solid var(--blue);display:flex;align-items:center;justify-content:center;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="var(--blue)" stroke="none"/></svg>
      </div>
      <div class="setwrap">
        <span class="setlbl">Set Speed</span>
        <div class="setctrl">
          <button onclick="chg(-1)">−</button>
          <span id="setval">65</span>
          <button onclick="chg(1)">+</button>
        </div>
      </div>
      <div class="sl">
        <span class="sl-l">SPEED<br>LIMIT</span>
        <span class="sl-n" id="slimit">65</span>
      </div>
    </div>

    <div class="odo">
      <div class="odo-l">Odometer</div>
      <div id="odov">024,187.3 mi</div>
    </div>

    <!-- MUSIC -->
    <div class="music">
      <div class="mhdr">
        <div class="msrc"><div class="gd"></div> Music</div>
        <span id="mstatus">Tap play</span>
      </div>
      <div class="arow">
        <div class="art" id="artbox">♪</div>
        <div class="smeta">
          <div class="stitle" id="stitle">Electronic Beats</div>
          <div class="sartist" id="sartist">Free Music · Track 1</div>
        </div>
      </div>
      <div class="prow">
        <span class="tlbl" id="tcur">0:00</span>
        <div class="pbar" id="pbar" onclick="seek(event)"><div class="pfill" id="pfill"></div></div>
        <span class="tlbl" id="tdur">0:00</span>
      </div>
      <div class="mctrl">
        <button class="mcb" onclick="prev()" title="Prev">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="mcb pbtn" id="pbtn" onclick="togglePlay()">
          <svg id="pico" width="21" height="21" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="mcb" onclick="next()" title="Next">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.5 3.14L8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
      <div class="vrow">
        <svg class="vico" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
        <div class="vtrack" id="vtrack" onclick="setVol(event)"><div class="vfill" id="vfill"></div></div>
        <svg class="vico" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </div>
    </div>

    <div class="bbar">
      <button class="bb on">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
        Car
      </button>
      <button class="bb" onclick="locateMap()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        Map
      </button>
      <button class="bb">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        Music
      </button>
      <button class="bb">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        Alerts
      </button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="mtopbar">
      <div class="msearch">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Search destination...
      </div>
      <button class="mbtn" onclick="locateMap()" title="My Location">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </button>
    </div>

    <!-- OpenStreetMap embed — free, no API key needed -->
    <iframe id="map"
      src="https://www.openstreetmap.org/export/embed.html?bbox=-0.27,51.74,-0.19,51.78&layer=mapnik&marker=51.7612,-0.2353"
      style="width:100%;height:100%;border:none;display:block;padding-top:46px;"
      allowfullscreen loading="lazy">
    </iframe>

    <div class="gpspill">
      <div class="gdot" id="gdot"></div>
      <span id="gtxt">GPS: waiting...</span>
    </div>
  </div>
</div>

<script>
/* ── CLOCK ── */
function tick(){
  const n=new Date(); let h=n.getHours(),m=n.getMinutes();
  const ap=h>=12?'PM':'AM'; h=h%12||12;
  document.getElementById('clock').textContent=`${h}:${String(m).padStart(2,'0')} ${ap}`;
}
tick(); setInterval(tick,1000);

/* ── FULLSCREEN ── */
function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById('fsico').innerHTML='<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>';
  } else {
    document.exitFullscreen();
    document.getElementById('fsico').innerHTML='<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
  }
}
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement)
    document.getElementById('fsico').innerHTML='<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
});

/* ── GPS SPEED ── */
let odo=24187.3, lastC=null;
function haversine(a,b,c,d){
  const R=6371000,r=Math.PI/180,dL=(c-a)*r,dN=(d-b)*r;
  const x=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function fmtOdo(v){
  const[i,d]=v.toFixed(1).split('.');
  return i.replace(/\B(?=(\d{3})+(?!\d))/g,',')+'.'+d+' mi';
}
if(navigator.geolocation){
  navigator.geolocation.watchPosition(pos=>{
    const mph=pos.coords.speed>0?pos.coords.speed*2.23694:0;
    const r=Math.round(mph);
    document.getElementById('spd').textContent=r;
    document.getElementById('spd').classList.toggle('over',r>+document.getElementById('slimit').textContent&&r>0);
    document.getElementById('gdot').classList.add('ok');
    document.getElementById('gtxt').textContent=`GPS ✓  acc:${Math.round(pos.coords.accuracy)}m`;
    if(lastC){
      odo+=haversine(lastC.lat,lastC.lon,pos.coords.latitude,pos.coords.longitude)*0.000621371;
      document.getElementById('odov').textContent=fmtOdo(odo);
    }
    lastC={lat:pos.coords.latitude,lon:pos.coords.longitude};
  },err=>{
    document.getElementById('gdot').classList.remove('ok');
    document.getElementById('gtxt').textContent='GPS: '+(err.code===1?'permission denied':'error');
  },{enableHighAccuracy:true,maximumAge:500,timeout:10000});
} else {
  document.getElementById('gtxt').textContent='GPS not supported';
}

/* ── SET SPEED ── */
let sv=65;
function chg(d){sv=Math.min(120,Math.max(0,sv+d));document.getElementById('setval').textContent=sv;}

/* ── MAP LOCATE ── */
function locateMap(){
  navigator.geolocation?.getCurrentPosition(pos=>{
    const{latitude:la,longitude:lo}=pos.coords,m=0.018;
    document.getElementById('map').src=
      `https://www.openstreetmap.org/export/embed.html?bbox=${lo-m},${la-m},${lo+m},${la+m}&layer=mapnik&marker=${la},${lo}`;
    document.getElementById('gtxt').textContent=`Map: ${la.toFixed(4)}, ${lo.toFixed(4)}`;
  },()=>{document.getElementById('gtxt').textContent='Need location permission';});
}

/* ── AUDIO PLAYER ── */
// Royalty-free CC0 tracks from soundhelix.com
const tracks=[
  {title:'Electronic Beats',    artist:'Free Music · Track 1', color:'linear-gradient(135deg,#667eea,#764ba2)', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'},
  {title:'Upbeat Drive',        artist:'Free Music · Track 2', color:'linear-gradient(135deg,#f093fb,#f5576c)', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'},
  {title:'Chill Highway',       artist:'Free Music · Track 3', color:'linear-gradient(135deg,#4facfe,#00f2fe)', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'},
  {title:'Night Cruise',        artist:'Free Music · Track 4', color:'linear-gradient(135deg,#43e97b,#38f9d7)', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3'},
];
let audio=null, cur=0, vol=0.7, wasPlaying=false;

function fmt(s){if(isNaN(s)||!isFinite(s))return'0:00';return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

function loadTrack(i, autoplay){
  if(audio){audio.pause();audio=null;}
  const t=tracks[i];
  document.getElementById('stitle').textContent=t.title;
  document.getElementById('sartist').textContent=t.artist;
  document.getElementById('artbox').style.background=t.color;
  document.getElementById('pfill').style.width='0%';
  document.getElementById('tcur').textContent='0:00';
  document.getElementById('tdur').textContent='0:00';
  document.getElementById('pico').innerHTML='<path d="M8 5v14l11-7z"/>';
  document.getElementById('artbox').classList.remove('glow');
  document.getElementById('mstatus').textContent='Loading...';

  audio=new Audio(t.url);
  audio.volume=vol;
  audio.addEventListener('loadedmetadata',()=>{document.getElementById('tdur').textContent=fmt(audio.duration);});
  audio.addEventListener('timeupdate',()=>{
    if(!audio.duration)return;
    document.getElementById('pfill').style.width=(audio.currentTime/audio.duration*100)+'%';
    document.getElementById('tcur').textContent=fmt(audio.currentTime);
  });
  audio.addEventListener('playing',()=>{document.getElementById('mstatus').textContent='▶ Playing';});
  audio.addEventListener('waiting',()=>{document.getElementById('mstatus').textContent='Buffering...';});
  audio.addEventListener('error',()=>{document.getElementById('mstatus').textContent='Load error – check connection';});
  audio.addEventListener('ended',()=>next());

  if(autoplay){
    audio.play().then(()=>{
      document.getElementById('pico').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      document.getElementById('artbox').classList.add('glow');
    }).catch(()=>{document.getElementById('mstatus').textContent='Tap play to start';});
  } else {
    document.getElementById('mstatus').textContent='Tap play to start';
  }
}

function togglePlay(){
  if(!audio){loadTrack(cur,true);return;}
  if(audio.paused){
    audio.play().then(()=>{
      document.getElementById('pico').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      document.getElementById('artbox').classList.add('glow');
    }).catch(()=>{document.getElementById('mstatus').textContent='Blocked – tap again';});
  } else {
    audio.pause();
    document.getElementById('pico').innerHTML='<path d="M8 5v14l11-7z"/>';
    document.getElementById('artbox').classList.remove('glow');
    document.getElementById('mstatus').textContent='Paused';
  }
}

function next(){
  wasPlaying=audio&&!audio.paused;
  cur=(cur+1)%tracks.length;
  loadTrack(cur,wasPlaying);
}
function prev(){
  if(audio&&audio.currentTime>3){audio.currentTime=0;return;}
  wasPlaying=audio&&!audio.paused;
  cur=(cur-1+tracks.length)%tracks.length;
  loadTrack(cur,wasPlaying);
}

function seek(e){
  if(!audio||!audio.duration)return;
  audio.currentTime=(e.offsetX/document.getElementById('pbar').offsetWidth)*audio.duration;
}
function setVol(e){
  vol=Math.max(0,Math.min(1,e.offsetX/document.getElementById('vtrack').offsetWidth));
  document.getElementById('vfill').style.width=(vol*100)+'%';
  if(audio)audio.volume=vol;
}

// init first track (no autoplay — browser blocks it without gesture)
loadTrack(0,false);
</script>
</body>
</html>
